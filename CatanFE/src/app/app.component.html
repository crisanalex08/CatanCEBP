<div class="landing-container">
  <div class="blured-background"></div>
  <div class="landing">
    <h1>CATAN</h1>
  </div>
  <div class="landing-form">
    <span>  
      <input type="text" placeholder="player name" [(ngModel)]="playerName">
    </span>
    <span>  
      <input type="text" placeholder="server code" [(ngModel)]="serverCode">
    </span>
    <span>  
      <button (click)="onSubmit()">PLAY</button>
    </span>
  </div>
</div>
